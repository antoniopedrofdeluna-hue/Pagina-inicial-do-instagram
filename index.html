<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instagram</title>
</head>
<body>
    <main class="main-container">
        <section class="branding">
          <a href="https://www.instagram.com/" class="logo-link">
            <img src="logo-instagram.png" alt="Logo do Instagram" class="logo">
          </a>
          <h1>Veja momentos do dia a dia dos seus <span class="gradient-text">Amigos próximos</span></h1>
          <div class="image-wrapper">
            <img src="mockup-fotos.png" alt="Fotos de exemplos">
          </div>
        </section>
        <section class="login-form">
          <div class="form-box">
            <h2>Entrar no Instagram</h2>
            <form>
              <input type="text" placeholder="Número de celular, nome de usuário ou email"> 
              <input type="password" placeholder="Senha">
              <button type="submit" class="btn-login">Entrar</button>
            </form>
            <button class="btn-secondary btn-outline">Entrar com conta</button>
            <div class="alternative-actions">
              <button class="btn-secondary">Entrar com Facebook</button>
              <a href="https://www.instagram.com/accounts/password/reset/" class="link-forgot">Esqueci minha senha</a>
            </div>
            <div class="footer-meta">
              <p>∞ Meta</p>
            </div>
          </div>
        </section>
      </main>
    </body>
  </html>

<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instragam</title>
</head>
<body>
    <main class="main-container">
        <section class="Branding">
          <img src="logo-instragam.png" alt="Logo" class="logo">
          <h1>Veja momentos do dia a dia dos seus <span class="grandient-text">Amigos próximos</span></h1>
        <div class="image-wrapper">
            <img src="mockup-fotos.png" alt="Fotos de exemplos">
        </div>
    </section>
     <section class="Login-Area">
        <div class="Farm-box">
        <h2>Entrar no Instragam</h2>
        <form>
            <input type="text" placeholder="Número de celular, nome de úsarioou email "> 
            <input type="password" placeholder="Senha">
            <button type="Submit" class="btn-Login">Entar</button>
            </form>
            <button class="btn-secondary btn-outline">Entar com conta</button>
            <div class="alternative-actions">
              <button class="btn-secondary">Entrar com facebook</button>
              <a href="#" class="link-forgot">Esqueci minha senha</a>
            </div>
            <div class="footer-meta">
              <p>∞ Meta</p>
            </div>
            </div>
            </section>
            </main>
            </body>
            </html>
</body>
</html>

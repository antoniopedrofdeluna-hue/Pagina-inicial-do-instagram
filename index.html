<!DOCTYPE html>
<html lang="Pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instragam - Login /title>

</head>
<body>
    <main class="Conteiner">
        <section class="Banner">
         <div class="Logo-insta">
        
            <img src="logo.png" alt="Instragam Logo" width="60">
        </div>
        <h1>veja o momento do dia a dia dos seus <span>Amigos próximos</span>
        <div class="Cards-preview">
         
            <img src="fotos.png" alt="Preview Fotos" width="300">


        </div>    
    </section>
     <section class="Login-Section">
        <div class="Login-Box">
        <h2>Entrar no Instragam</h2>
        <form>
            <input type="text" placeholder="Número de celular, nome de úsarioou email "> 
            <input type="password" placeholder="Senha">
            <button type="Submit" class="btn-Login">Entar</button>
            </form>
            <a href="#" class="forgot-Password" >Esqueceu a senha?</a>
            <div class="divider">
              <button class="btn-facebook">Entrar com Faceebook</button>
              <button class="btn-create">Criar nova conta</button>
            </div>
            <div class="meta-footer">
              <span>∞ Meta</span>
            </div>
            </div>
            </section>
            </main>
            </body>
            </html>
             


</body>
